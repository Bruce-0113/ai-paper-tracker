name: Daily AI Papers

on:
  schedule:
    - cron: "0 1 * * *"   # UTC 01:00 = 台北時間 09:00
  workflow_dispatch:        # 允許手動觸發（方便第一次測試）

jobs:
  fetch-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 讓 Actions 可以 push commit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch papers from arXiv
        run: python scripts/fetch_papers.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/papers.json
          # 只有真的有變化才 commit，避免產生空 commit
          git diff --staged --quiet || \
            git commit -m "📄 Daily paper update $(date +'%Y-%m-%d')"
          git push
